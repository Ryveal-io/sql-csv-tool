<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Body -->
  <ellipse cx="64" cy="72" rx="48" ry="44" fill="#6C5CE7"/>
  <!-- Belly -->
  <ellipse cx="64" cy="78" rx="32" ry="28" fill="#A29BFE"/>
  <!-- CSV text on belly -->
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#6C5CE7">CSV</text>
  <!-- Left eye white -->
  <ellipse cx="46" cy="48" rx="14" ry="16" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="82" cy="48" rx="14" ry="16" fill="white"/>
  <!-- Left pupil -->
  <circle cx="48" cy="50" r="7" fill="#2D3436"/>
  <!-- Left eye shine -->
  <circle cx="51" cy="47" r="2.5" fill="white"/>
  <!-- Right pupil -->
  <circle cx="84" cy="50" r="7" fill="#2D3436"/>
  <!-- Right eye shine -->
  <circle cx="87" cy="47" r="2.5" fill="white"/>
  <!-- Mouth -->
  <path d="M 40 64 Q 52 80 64 64 Q 76 80 88 64" fill="#2D3436"/>
  <!-- Teeth -->
  <polygon points="48,64 52,71 56,64" fill="white"/>
  <polygon points="60,64 64,72 68,64" fill="white"/>
  <polygon points="72,64 76,71 80,64" fill="white"/>
  <!-- Left horn -->
  <path d="M 36 34 L 28 10 L 44 28 Z" fill="#FD79A8"/>
  <!-- Right horn -->
  <path d="M 92 34 L 100 10 L 84 28 Z" fill="#FD79A8"/>
  <!-- Left arm -->
  <path d="M 18 68 Q 8 58 14 48" stroke="#6C5CE7" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M 110 68 Q 120 58 114 48" stroke="#6C5CE7" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="44" cy="114" rx="14" ry="8" fill="#5B4CC4"/>
  <!-- Right foot -->
  <ellipse cx="84" cy="114" rx="14" ry="8" fill="#5B4CC4"/>
</svg>
